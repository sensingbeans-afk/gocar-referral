                subtitle: "Izmantojiet manu GoCar referāla kodu zemāk un mēs abi saņemsim 25 € kredītu pēc pirmā brauciena pabeigšanas",

        let currentLang = 'en';

        // (The rest of the script is the same as the previous version – setLanguage, copyCode, buildLanguageSwitcher, detectLanguage, window.onload)
        // I kept it exactly the same but expanded the supported languages and the switcher list.

        function setLanguage(lang) {
            if (!translations[lang]) return;
            currentLang = lang;
            
            document.title = translations[lang].title;
            document.getElementById('header').innerHTML = translations[lang].header;
            document.getElementById('subtitle').innerHTML = translations[lang].subtitle;
            document.getElementById('referral-label').textContent = translations[lang].referralLabel;
            document.getElementById('button-text').textContent = translations[lang].buttonText;
            document.getElementById('copied-text').textContent = translations[lang].copiedText;
            document.getElementById('howto-title').innerHTML = `<i class="fa-solid fa-circle-info text-emerald-600"></i> ${translations[lang].howtoTitle}`;
            
            const stepsContainer = document.getElementById('steps');
            stepsContainer.innerHTML = '';
            translations[lang].steps.forEach((text, index) => {
                const li = document.createElement('li');
                li.className = "flex gap-4";
                li.innerHTML = `<span class="font-mono bg-emerald-100 text-emerald-700 w-8 h-8 rounded-2xl flex items-center justify-center font-bold flex-shrink-0">${index + 1}</span>${text}`;
                stepsContainer.appendChild(li);
            });
            
            document.getElementById('footer').textContent = translations[lang].footer;
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
        }

        function copyCode() {
            const codeElement = document.getElementById('code');
            const codeText = codeElement.textContent.trim();
            const buttonText = document.getElementById('button-text');
            const feedback = document.getElementById('feedback');

            navigator.clipboard.writeText(codeText).then(() => {
                const original = buttonText.innerHTML;
                buttonText.innerHTML = `<i class="fa-solid fa-check"></i>`;
                feedback.classList.remove('hidden');

                setTimeout(() => {
                    buttonText.innerHTML = original;
                    feedback.classList.add('hidden');
                }, 2500);
            });
        }

        function buildLanguageSwitcher() {
            const container = document.getElementById('language-switcher');
            const languages = [
                { code: 'en', flag: '🇬🇧', name: 'EN' },
                { code: 'fr', flag: '🇫🇷', name: 'FR' },
                { code: 'de', flag: '🇩🇪', name: 'DE' },
                { code: 'es', flag: '🇪🇸', name: 'ES' },
                { code: 'nl', flag: '🇳🇱', name: 'NL' },
                { code: 'it', flag: '🇮🇹', name: 'IT' },
                { code: 'pl', flag: '🇵🇱', name: 'PL' },
                { code: 'pt', flag: '🇵🇹', name: 'PT' },
                { code: 'ru', flag: '🇷🇺', name: 'RU' },
                { code: 'ro', flag: '🇷🇴', name: 'RO' },
                { code: 'uk', flag: '🇺🇦', name: 'UA' },
                { code: 'sv', flag: '🇸🇪', name: 'SV' },
                { code: 'el', flag: '🇬🇷', name: 'EL' },
                { code: 'cs', flag: '🇨🇿', name: 'CS' },
                { code: 'hu', flag: '🇭🇺', name: 'HU' },
                { code: 'fi', flag: '🇫🇮', name: 'FI' },
                { code: 'bg', flag: '🇧🇬', name: 'BG' },
                { code: 'hr', flag: '🇭🇷', name: 'HR' },
                { code: 'sk', flag: '🇸🇰', name: 'SK' },
                { code: 'lt', flag: '🇱🇹', name: 'LT' },
                { code: 'lv', flag: '🇱🇻', name: 'LV' }
            ];

            languages.forEach(lang => {
                const btn = document.createElement('button');
                btn.className = `lang-btn flex items-center gap-1.5 px-4 py-2 rounded-2xl text-sm font-medium border border-gray-200 hover:border-emerald-300`;
                btn.dataset.lang = lang.code;
                btn.innerHTML = `${lang.flag} <span>${lang.name}</span>`;
                btn.onclick = () => setLanguage(lang.code);
                container.appendChild(btn);
            });
        }

        function detectLanguage() {
            const browserLang = navigator.language.split('-')[0];
            const supported = ['en','fr','de','es','nl','it','pl','pt','ru','ro','uk','sv','el','cs','hu','fi','bg','hr','sk','lt','lv'];
            return supported.includes(browserLang) ? browserLang : 'en';
        }

        window.onload = () => {
            buildLanguageSwitcher();
            const initialLang = detectLanguage();
            setLanguage(initialLang);
            tailwind.config = { content: [] };
        };
    </script>
